<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-480.css">
    <link rel="stylesheet" href="style-481-768.css">
</head>
<body>
<div class="wrapper">
    <h2>Test</h2>

    <label for="nameValueId">Name/Value Pair</label>

    <div class="top-block">
        <div class="input-block">
            <input type="text" id="nameValueId" name="nameValue" placeholder="Name=Value">
        </div>
        <button id="btnAdd">Add</button>
    </div>

    <div class="bottom-block">
        <div class="list-container">
            <label>Name/Value Pair List</label>
            <ul id="list"></ul>
        </div>

        <div class="buttons">
            <button id="btnSrtName">Sort by Name</button>
            <button id="btnSrtVal">Sort by Value</button>
            <button id="btnDel">Delete</button>
        </div>
    </div>
</div>

<script src="main.js"></script>

</body>
</html>
